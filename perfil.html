<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clic_Creativo - Mi Perfil</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 font-sans">
    <div class="max-w-md mx-auto mt-12 p-6 bg-white rounded-2xl shadow-md border border-gray-100">
        <h2 class="text-xl font-bold text-gray-800 mb-4">Perfil de Usuario</h2>
        
        <div class="space-y-3 border-t border-b border-gray-100 py-4 mb-6">
            <p class="text-sm text-gray-600"><strong>Nombre:</strong> <span id="perfilNombre">Cargando...</span></p>
            <p class="text-sm text-gray-600"><strong>Mis datos:</strong> Cuenta de Cliente Simulada</p>
            <p class="text-sm text-gray-400"><strong>Mis compras:</strong> (Próximamente)</p>
        </div>

        <button onclick="cerrarSesion()" class="w-full bg-red-500 hover:bg-red-600 text-white font-medium py-2 rounded-lg transition-colors">
            Cerrar Sesión (Simulado)
        </button>
    </div>

    <script>
        // Carga el nombre que se registró o se logueó
        document.getElementById('perfilNombre').textContent = localStorage.getItem('sim_user_name') || 'Invitado';

        function cerrarSesion() {
            localStorage.clear();
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
