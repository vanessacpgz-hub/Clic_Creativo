<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clic Creativo - Mi Perfil</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet" />
  <style>
    /* Estilos específicos para la tarjeta de perfil usando tus variables */
    .profile-body {
      background: var(--rosa-light);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .profile-card {
      background: var(--blanco);
      border: 2px solid var(--rosa);
      border-radius: 28px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 15px 35px rgba(230,0,115,0.08);
      text-align: center;
    }
    .profile-card h2 {
      font-family: 'Playfair Display', serif;
      color: var(--magenta);
      font-size: 2rem;
      margin-bottom: 1.5rem;
    }
    .profile-info {
      text-align: left;
      background: var(--rosa-pale);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }
    .profile-info p {
      font-size: 0.95rem;
      color: var(--gris-soft);
    }
    .profile-info strong {
      color: var(--gris);
    }
    .btn-logout {
      width: 100%;
      background: #e1306c; /* Un tono vibrante que combina, o puedes usar var(--magenta-dark) */
      color: white;
      border: none;
      border-radius: 50px;
      padding: 0.8rem 2rem;
      font-family: 'Quicksand', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .btn-logout:hover {
      background: #b8005c;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(225, 48, 108, 0.3);
    }
    .btn-back {
      display: inline-block;
      margin-top: 1rem;
      color: var(--magenta);
      text-decoration: none;
      font-size: 0.88rem;
      font-weight: 700;
    }
    .btn-back:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body class="profile-body">

  <div class="profile-card">
    <h2>Mi Perfil</h2>
    
    <div class="profile-info">
      <p><strong>Nombre:</strong> <span id="perfilNombre">Cargando...</span></p>
      <p><strong>Tipo de cuenta:</strong> Mayra Capetillo</p>
      <p style="color: #b0b0b0; font-style: italic;"><strong>Mis compras:</strong> (Próximamente)</p>
    </div>

    <button onclick="cerrarSesion()" class="btn-logout">
      Cerrar Sesión
    </button>
    
    <a href="index.html" class="btn-back">← Volver al inicio</a>
  </div>

  <script>
    // Carga el nombre que se registró o se logueó
    document.getElementById('perfilNombre').textContent = localStorage.getItem('sim_user_name') || 'Invitado';

    function cerrarSesion() {
        localStorage.clear();
        window.location.href = "index.html"; // Te regresa al index ya limpio sin sesión
    }
  </script>
</body>
</html>
