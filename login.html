<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clic_Creativo - Iniciar Sesión</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 flex flex-col min-vh-100 font-sans">

    <div class="flex-grow flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-2xl shadow-md w-full max-w-md border border-gray-100">
            <h2 class="text-2xl font-bold text-gray-800 text-center mb-2">¡Bienvenido!</h2>
            <p class="text-sm text-gray-500 text-center mb-6">Ingresa a tu cuenta simulada</p>
            
            <form id="loginForm" class="space-y-4">
                <!-- Campo Correo -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Correo Electrónico</label>
                    <input type="email" id="logCorreo" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="correo@ejemplo.com">
                </div>
                <!-- Campo Contraseña -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
                    <input type="password" id="logPassword" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="••••••••">
                </div>
                
                <!-- Botón Entrar -->
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 rounded-lg transition-colors mt-6">
                    Entrar
                </button>
            </form>
            
            <p class="text-center text-sm text-gray-600 mt-4">
                ¿No tienes cuenta? <a href="registro.html" class="text-indigo-600 hover:underline">Regístrate aquí</a>
            </p>
        </div>
    </div>

    <!-- Lógica de acceso directo simulado -->
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Captura los datos ingresados
            const correoIngresado = document.getElementById('logCorreo').value;
            
            // Si el usuario no se registró previamente, le damos un nombre ficticio por defecto
            if (!localStorage.getItem('sim_user_name')) {
                localStorage.setItem('sim_user_name', 'Usuario Ficticio');
                localStorage.setItem('sim_user_email', correoIngresado);
            }
            
            // Te manda directo a Perfil cumpliendo con "sin validar real"
            window.location.href = "perfil.html";
        });
    </script>
    <script>
    document.addEventListener("DOMContentLoaded", function() {
        // Comprobamos si hay un usuario guardado en el localStorage
        const usuarioGuardado = localStorage.getItem('sim_user_name');
        
        if (usuarioGuardado) {
            // Buscamos la zona de los botones de login (puedes ponerle un id="auth-zone" a ese contenedor)
            const authZone = document.getElementById('auth-zone');
            if (authZone) {
                authZone.innerHTML = `
                    <span class="text-gray-700 font-medium">¡Hola, ${usuarioGuardado}!</span>
                    <a href="perfil.html" class="text-indigo-600 hover:underline font-medium ml-2">Ver Perfil</a>
                `;
            }
        }
    });
</script>
</body>
</html>
