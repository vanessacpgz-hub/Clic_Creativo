<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clic_Creativo - Iniciar Sesión</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-950 bg-white/5 backdrop-blur-xl focus:ring-pink-500/20 from-pink-600 to-rose-500">

    <div class="flex-grow flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-2xl shadow-md w-full max-w-md border border-gray-100">
            <h2 class="text-2xl font-bold text-gray-800 text-center mb-2">¡Bienvenido!</h2>
            <p class="text-sm text-gray-500 text-center mb-6">Ingresa a tu cuenta</p>
            
            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Correo Electrónico</label>
                    <input type="email" id="logCorreo" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-gray-800" placeholder="correo@ejemplo.com">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Contraseña</label>
                    <input type="password" id="logPassword" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 text-gray-800" placeholder="••••••••">
                </div>
                
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 rounded-lg transition-colors mt-6 cursor-pointer">
                    Entrar
                </button>
            </form>
            
            <p class="text-center text-sm text-gray-600 mt-4">
                ¿Olvidaste tu contraseña? <a href="Registro.html" class="text-indigo-600 hover:underline font-medium">Haz click aquí</a>
            </p>
        </div>
    </div>

    <script>
        // Todo consolidado en un solo bloque de JS al cargar el DOM
        document.addEventListener("DOMContentLoaded", function() {
            
            // 1. Lógica para capturar el correo del registro si viene en la URL
            const urlParams = new URLSearchParams(window.location.search);
            const correoRegistrado = urlParams.get('registrado');
            const inputCorreo = document.getElementById('logCorreo'); // ID Corregido aquí
            
            if (correoRegistrado && inputCorreo) {
                inputCorreo.value = correoRegistrado;
            }

            // 2. Manejo del envío del formulario
            document.getElementById('loginForm').addEventListener('submit', function(e) {
                e.preventDefault();
                
                const correoIngresado = document.getElementById('logCorreo').value;
                const usuarioRegistrado = localStorage.getItem('sim_user_email');
                
                // Si el correo no coincide con el que se registró, asignamos un fallback
                if (usuarioRegistrado !== correoIngresado) {
                    localStorage.setItem('sim_user_name', 'Usuario Ficticio');
                    localStorage.setItem('sim_user_email', correoIngresado);
                }
                
                // Redirección inmediata a la vista del Perfil
                window.location.href = "perfil.html";
            });
        });
    </script>
</body>
</html>
