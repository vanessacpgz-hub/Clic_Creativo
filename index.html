<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clic_Creativo - Oferta Exclusiva</title>
    <!-- Tailwind CSS v4 -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet" />
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center p-4 overflow-hidden relative">

    <!-- Círculos decorativos de fondo tipo anuncio moderno -->
    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-pink-600 rounded-full blur-[120px] opacity-30 pointer-events-none"></div>
    <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-indigo-600 rounded-full blur-[120px] opacity-30 pointer-events-none"></div>

    <!-- Contenedor del Mega Anuncio -->
    <main class="max-w-2xl w-full bg-white/5 backdrop-blur-xl border border-white/10 p-8 sm:p-12 rounded-3xl text-center shadow-2xl relative z-10 my-auto space-y-8 transform transition-transform">
        
        <!-- Nombre de la marca discreto arriba -->
        <p class="text-sm uppercase tracking-widest text-slate-400 font-medium">Clic_Creativo</p>
        
        <!-- El Gancho Comercial -->
        <div class="space-y-3">
            <span class="inline-block bg-pink-500 text-white text-xs font-extrabold px-3 py-1 rounded-full uppercase tracking-wider animate-pulse">
                🔥 ¡Oferta de Lanzamiento!
            </span>
            <h1 class="text-5xl sm:text-7xl font-black tracking-tight leading-none">
                <span class="bg-gradient-to-r from-pink-500 to-rose-400 bg-clip-text text-transparent">30% OFF</span>
            </h1>
            <p class="text-2xl sm:text-3xl font-extrabold text-slate-100 tracking-tight">
                En tu próxima Invitación Digital o Página Web
            </p>
            <p class="text-sm sm:text-base text-slate-400 max-w-md mx-auto font-normal">
                Haz clic abajo para ingresar a nuestra plataforma, conocer el catálogo completo y aplicar tu descuento automático.
            </p>
        </div>

        <!-- BOTÓN DE CONEXIÓN AL HOME -->
        <div class="pt-4">
            <a href="home.html" class="inline-block w-full sm:w-auto bg-gradient-to-r from-pink-600 to-rose-500 hover:from-pink-500 hover:to-rose-400 text-white font-extrabold text-xl px-12 py-5 rounded-2xl transition-all shadow-xl shadow-pink-600/30 tracking-wide hover:scale-[1.02] active:scale-[0.98] cursor-pointer">
                VISITAR SITIO WEB 🚀
            </a>
        </div>

        <!-- Enlace secundario discreto -->
        <div class="pt-2">
            <a href="home.html" class="text-xs text-slate-500 hover:text-slate-300 transition-colors underline underline-offset-4">
                Saltar anuncio e ir al inicio
            </a>
        </div>
        
    </main>

</body>
</html>
